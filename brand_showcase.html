<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Assets Showcase | PRESCOT Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@500;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --accent: #F97316;
            --text-primary: #F8FAFC;
            --text-muted: #94A3B8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(249, 115, 22, 0.07) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(30, 41, 59, 0.15) 0%, transparent 45%);
        }

        .container {
            display: flex;
            gap: 50px;
            padding: 40px;
        }

        .tile {
            position: relative;
            width: 360px;
            height: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tile:hover {
            transform: translateY(-15px);
            border-color: rgba(249, 115, 22, 0.4);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7),
                0 0 30px rgba(249, 115, 22, 0.15);
        }

        .logo-container {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .logo-container img {
            max-width: 140px;
            max-height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        .product-visual {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .product-visual img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.9));
        }

        .tile:hover .product-visual {
            transform: scale(1.15) rotate(2deg);
        }

        .info {
            width: 100%;
            text-align: center;
            z-index: 2;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .overlay-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0;
            filter: blur(50px);
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        .tile:hover .overlay-bg {
            opacity: 0.1;
        }

        .cta-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
        }

        .tile:hover .cta-btn {
            bottom: 30px;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Mi-Light Tile -->
        <div class="tile">
            <div class="overlay-bg"></div>
            <div class="logo-container">
                <img src="assets/milight_logo.png" alt="Mi-Light Logo">
            </div>
            <div class="product-visual">
                <img src="assets/milight_product.png" alt="Mi-Light FUT089 Remote">
            </div>
            <div class="info">
                <h2 class="title">Systemy Radiowe</h2>
                <p class="subtitle">Smart Control Solutions</p>
            </div>
            <div class="cta-btn">Konfiguruj</div>
        </div>

        <!-- Kluś Tile -->
        <div class="tile">
            <div class="overlay-bg"></div>
            <div class="logo-container">
                <img src="assets/klus_logo.png" alt="Kluś Logo">
            </div>
            <div class="product-visual">
                <img src="assets/klus_product.png" alt="Kluś Aluminum Profile">
            </div>
            <div class="info">
                <h2 class="title">Profile Aluminiowe</h2>
                <p class="subtitle">Architecture In Light</p>
            </div>
            <div class="cta-btn">Wybierz profil</div>
        </div>
    </div>

</body>

</html>
